[tox]
envlist = ruff,mypy,py,docs

[testenv:ruff]
skip_install = true
deps =
    ruff >= 0.15.0
commands =
    ruff check
    ruff format --check

[testenv:reformat]
deps =
    ruff >= 0.15.0
skip_install = True
commands =
    ruff format
    ruff check --fix

[testenv:mypy]
deps =
    mypy
    uvicorn
commands =
    mypy --strict falcon_sqla/
    mypy --strict examples/

[testenv:docs]
deps =
    .[docs]
commands =
    sphinx-build -W -E -b html {toxinidir}/docs {toxinidir}/docs/_build/html

[testenv:twine_check]
skipsdist = True
deps =
    build
    twine
commands =
    python -m build
    twine check --strict {toxinidir}/dist/*

[testenv]
deps =
    .[test]
setenv =
    FALCON_SQLA_TEST_DB = {envtmpdir}/test.db
commands =
    pytest --cov=falcon_sqla --cov-report=term-missing --cov-fail-under=80 tests/

[testenv:postgresql]
deps =
    .[test]
    psycopg2
passenv =
    FALCON_SQLA_POSTGRESQL_URI
commands =
    pytest tests/

[testenv:pypy3_postgresql]
basepython = pypy3
deps =
    .[test]
    psycopg2cffi
passenv =
    FALCON_SQLA_POSTGRESQL_URI
commands =
    pytest tests/

[coverage:run]
branch = True
omit =
    falcon_sqla/version.py
